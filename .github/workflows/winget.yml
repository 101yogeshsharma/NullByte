name: Publish to Winget

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Submit to Winget Releaser
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: 101yogeshsharma.NullByte
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
