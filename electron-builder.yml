appId: com.nullbyte.app
productName: NullByte
directories:
  output: dist
  app: .
files:
  - "main.js"
  - "preload.js"
  - "renderer/overlay.html"
  - "renderer/setup.html"
  - "renderer/settings.html"
  - "assets/icon.png"
  - "assets/icons/win/icon.ico"
  - "assets/icons/mac/icon.icns"
  - "build/installer.nsh"
  - "package.json"
  - "node_modules/**/*"
win:
  target: nsis
  icon: assets/icons/win/icon.ico
  requestedExecutionLevel: asInvoker
  artifactName: NullByte-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: NullByte
  include: build/installer.nsh
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: assets/icons/win/icon.ico
  uninstallerIcon: assets/icons/win/icon.ico
mac:
  target: dmg
  icon: assets/icons/mac/icon.icns
  artifactName: NullByte-${version}-${arch}.${ext}
dmg:
  sign: false
